name: Publish

on:
  push:
    tags:
      - "v*"

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    name: Build, Test & Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"
          registry-url: "https://registry.npmjs.org"

      - run: yarn install --immutable

      - run: yarn turbo run build test --filter='@daflan/*'

      - name: Validate tag matches package versions
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          FAILED=0
          for PKG in core platform-web codegen capacitor; do
            PKG_VERSION=$(node -p "require('./packages/${PKG}/package.json').version")
            if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
              echo "::error::packages/${PKG} version ($PKG_VERSION) != tag ($TAG_VERSION)"
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then exit 1; fi

      - name: Pack and publish @daflan/keyward-core
        run: |
          yarn workspace @daflan/keyward-core pack --out %s.tgz
          npm publish daflan-keyward-core.tgz --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Pack and publish @daflan/keyward-platform-web
        run: |
          yarn workspace @daflan/keyward-platform-web pack --out %s.tgz
          npm publish daflan-keyward-platform-web.tgz --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Pack and publish @daflan/keyward-codegen
        run: |
          yarn workspace @daflan/keyward-codegen pack --out %s.tgz
          npm publish daflan-keyward-codegen.tgz --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Pack and publish @daflan/keyward-capacitor
        run: |
          yarn workspace @daflan/keyward-capacitor pack --out %s.tgz
          npm publish daflan-keyward-capacitor.tgz --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
